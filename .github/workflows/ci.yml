name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  quality-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: vx

      - name: Format check
        run: deno fmt --check .

      - name: Lint
        run: deno lint .

      - name: Type check
        run: deno check main.ts client.ts utils.ts vite.config.ts routes/*.tsx routes/api/*.tsx islands/*.tsx components/*.tsx

      - name: Build
        run: deno task build
